<!DOCTYPE html>
<html lang="ro">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>COD Risk Score — Dashboard</title>
  <link href="https://fonts.googleapis.com/css2?family=Instrument+Sans:wght@400;500;600;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #09090f; color: #e0e0e0; font-family: 'Instrument Sans', -apple-system, sans-serif; min-height: 100vh; }
    .mono { font-family: 'DM Mono', monospace; }
    
    .header { border-bottom: 1px solid #1a1a2e; background: linear-gradient(180deg, #0f0f1a 0%, #09090f 100%); padding: 20px 32px; }
    .header-inner { max-width: 1200px; margin: 0 auto; display: flex; justify-content: space-between; align-items: center; }
    .header h1 { font-size: 22px; font-weight: 700; letter-spacing: -0.5px; }
    .live-dot { width: 8px; height: 8px; border-radius: 50%; background: #22C55E; box-shadow: 0 0 8px rgba(34,197,94,0.5); display: inline-block; margin-right: 8px; }
    .live-label { font-family: 'DM Mono', monospace; font-size: 11px; color: #555; letter-spacing: 2px; }
    
    .container { max-width: 1200px; margin: 0 auto; padding: 24px 32px; }
    
    .stats-row { display: flex; gap: 12px; margin-bottom: 24px; flex-wrap: wrap; }
    .stat-card { padding: 20px 24px; border-radius: 12px; border: 1px solid #1a1a2e; background: #0d0d1a; flex: 1; min-width: 160px; }
    .stat-label { font-size: 11px; color: #555; font-family: 'DM Mono', monospace; letter-spacing: 1.5px; text-transform: uppercase; margin-bottom: 8px; }
    .stat-value { font-size: 28px; font-weight: 700; font-family: 'DM Mono', monospace; line-height: 1; }
    .stat-sub { font-size: 12px; color: #555; margin-top: 6px; }
    
    .charts-row { display: grid; grid-template-columns: 2fr 1fr; gap: 12px; margin-bottom: 24px; }
    .chart-card { padding: 20px; border-radius: 12px; border: 1px solid #1a1a2e; background: #0d0d1a; }
    .chart-title { font-size: 11px; color: #555; font-family: 'DM Mono', monospace; letter-spacing: 1.5px; margin-bottom: 16px; }
    
    .tabs { display: flex; gap: 0; border-bottom: 1px solid #1a1a2e; }
    .tab { padding: 12px 24px; background: none; border: none; color: #555; cursor: pointer; font-size: 13px; font-weight: 500; font-family: 'Instrument Sans', sans-serif; border-bottom: 2px solid transparent; }
    .tab.active { color: #fff; border-bottom-color: #22C55E; }
    
    .table-wrap { border: 1px solid #1a1a2e; border-top: none; border-radius: 0 0 12px 12px; background: #0d0d1a; overflow: hidden; max-height: 600px; overflow-y: auto; }
    .table-header { display: grid; padding: 10px 16px; gap: 12px; border-bottom: 1px solid #1a1a2e; }
    .table-header span { font-size: 10px; color: #444; font-family: 'DM Mono', monospace; letter-spacing: 1.5px; text-transform: uppercase; }
    .order-grid { grid-template-columns: 44px 1fr 100px 80px 120px 90px; }
    .hash-grid { grid-template-columns: 1fr 100px 100px 100px 140px; }
    
    .order-row { display: grid; grid-template-columns: 44px 1fr 100px 80px 120px 90px; align-items: center; padding: 12px 16px; gap: 12px; border-bottom: 1px solid #141425; cursor: pointer; transition: background 0.15s; }
    .order-row:hover { background: #0a0a1a; }
    .order-row.selected { background: #12122a; }
    
    .hash-row { display: grid; grid-template-columns: 1fr 100px 100px 100px 140px; padding: 12px 16px; gap: 12px; border-bottom: 1px solid #141425; }
    
    .bucket-badge { padding: 3px 10px; border-radius: 6px; font-size: 11px; font-weight: 600; font-family: 'DM Mono', monospace; letter-spacing: 0.5px; display: inline-block; }
    .status-badge { padding: 3px 8px; border-radius: 6px; font-size: 11px; display: inline-block; }
    
    .btn { padding: 8px 16px; border-radius: 8px; border: 1px solid #2a2a3e; background: #0d0d1a; color: #999; cursor: pointer; font-size: 12px; font-family: 'DM Mono', monospace; transition: all 0.2s; }
    .btn:hover { border-color: #444; color: #fff; }
    
    .panel-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.4); z-index: 99; }
    .panel { position: fixed; top: 0; right: 0; width: 420px; height: 100vh; background: #0d0d1a; border-left: 1px solid #1a1a2e; overflow-y: auto; z-index: 100; padding: 28px; animation: slideIn 0.25s ease; }
    @keyframes slideIn { from { transform: translateX(100%); } to { transform: translateX(0); } }
    
    .cat-bar-bg { height: 4px; border-radius: 2px; background: #1a1a2e; }
    .cat-bar-fill { height: 100%; border-radius: 2px; transition: width 0.5s ease; }
    
    .rule-row { display: flex; justify-content: space-between; padding: 8px 12px; border-radius: 6px; margin-bottom: 4px; }
    
    .data-row { display: flex; justify-content: space-between; padding: 6px 0; border-bottom: 1px solid #141425; }
    
    .empty { padding: 40px; text-align: center; color: #555; font-size: 13px; }
    
    canvas { width: 100% !important; }
    
    .pie-legend { display: flex; justify-content: center; gap: 12px; margin-top: 8px; }
    .pie-legend-item { display: flex; align-items: center; gap: 4px; }
    .pie-legend-dot { width: 6px; height: 6px; border-radius: 50%; }
    .pie-legend-label { font-size: 10px; color: #555; font-family: 'DM Mono', monospace; }
    
    @media (max-width: 768px) {
      .charts-row { grid-template-columns: 1fr; }
      .order-grid, .order-row { grid-template-columns: 40px 1fr 80px 60px 90px; }
      .order-row > :nth-child(6) { display: none; }
      .table-header.order-grid > :nth-child(6) { display: none; }
      .panel { width: 100%; }
    }
  </style>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
</head>
<body>

<div class="header">
  <div class="header-inner">
    <div>
      <div style="margin-bottom: 4px;">
        <span class="live-dot"></span>
        <span class="live-label">LIVE DASHBOARD</span>
      </div>
      <h1>COD Risk Score</h1>
    </div>
    <button class="btn" id="refreshBtn" onclick="fetchData()">Refresh</button>
  </div>
</div>

<div class="container">
  <div class="stats-row" id="statsRow"></div>
  
  <div class="charts-row">
    <div class="chart-card">
      <div class="chart-title">SCOR RISK PE COMENZI</div>
      <canvas id="lineChart" height="160"></canvas>
    </div>
    <div class="chart-card">
      <div class="chart-title">DISTRIBUTIE RISC</div>
      <canvas id="pieChart" height="160"></canvas>
      <div class="pie-legend" id="pieLegend"></div>
    </div>
  </div>
  
  <div class="tabs">
    <button class="tab active" id="tabOrders" onclick="switchTab('orders')">Comenzi</button>
    <button class="tab" id="tabReputation" onclick="switchTab('reputation')">Reputatie retea</button>
  </div>
  
  <div id="ordersTable"></div>
  <div id="reputationTable" style="display:none;"></div>
</div>

<div id="panelOverlay" class="panel-overlay" style="display:none;" onclick="closePanel()"></div>
<div id="panel" class="panel" style="display:none;"></div>

<script>
const SUPABASE_URL = "https://hoyhptnrdhhpsybpvnab.supabase.co";
const SUPABASE_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImhveWhwdG5yZGhocHN5YnB2bmFiIiwicm9sZSI6InNlcnZpY2Vfcm9sZSIsImlhdCI6MTc3MjgwNDYxMiwiZXhwIjoyMDg4MzgwNjEyfQ.gt3qMyfqv4Ycu8eu3T2ia4TIFAS5NGXE7qzrtIATE0s";

const BUCKET = {
  Low: { bg: "#0D2818", border: "#22C55E", text: "#4ADE80", dot: "#22C55E" },
  Medium: { bg: "#1C1608", border: "#EAB308", text: "#FACC15", dot: "#EAB308" },
  High: { bg: "#1C0808", border: "#EF4444", text: "#F87171", dot: "#EF4444" },
  Critical: { bg: "#2D0A0A", border: "#DC2626", text: "#FCA5A5", dot: "#DC2626" },
};

let orders = [], hashes = [], lineChart = null, pieChart = null, selectedOrder = null;

async function supaQ(table, params = "") {
  const r = await fetch(`${SUPABASE_URL}/rest/v1/${table}?${params}`, {
    headers: { apikey: SUPABASE_KEY, Authorization: `Bearer ${SUPABASE_KEY}` },
  });
  return r.json();
}

async function fetchData() {
  document.getElementById("refreshBtn").textContent = "...";
  try {
    [orders, hashes] = await Promise.all([
      supaQ("orders", "select=*&order=scored_at.desc&limit=100"),
      supaQ("customer_hashes", "select=*&order=last_seen.desc&limit=50"),
    ]);
  } catch (e) { console.error(e); }
  document.getElementById("refreshBtn").textContent = "Refresh";
  render();
}

function miniRingSVG(score, bucket, size = 36) {
  const c = BUCKET[bucket] || BUCKET.Low;
  const r = (size - 6) / 2, circ = 2 * Math.PI * r, pct = Math.min(score / 130, 1);
  return `<svg width="${size}" height="${size}" style="transform:rotate(-90deg)">
    <circle cx="${size/2}" cy="${size/2}" r="${r}" fill="none" stroke="#1a1a2e" stroke-width="3"/>
    <circle cx="${size/2}" cy="${size/2}" r="${r}" fill="none" stroke="${c.dot}" stroke-width="3"
      stroke-linecap="round" stroke-dasharray="${circ}" stroke-dashoffset="${circ*(1-pct)}"/>
  </svg>`;
}

function render() {
  const total = orders.length;
  const avg = total > 0 ? Math.round(orders.reduce((s, o) => s + o.score_total, 0) / total) : 0;
  const bc = { Low: 0, Medium: 0, High: 0, Critical: 0 };
  orders.forEach(o => { if (bc[o.risk_bucket] !== undefined) bc[o.risk_bucket]++; });
  const hrPct = total > 0 ? Math.round(((bc.High + bc.Critical) / total) * 100) : 0;
  const val = orders.reduce((s, o) => s + Number(o.order_value), 0);
  const avgColor = avg > 69 ? "#F87171" : avg > 39 ? "#FACC15" : "#4ADE80";

  document.getElementById("statsRow").innerHTML = `
    <div class="stat-card"><div class="stat-label">Total comenzi</div><div class="stat-value">${total}</div></div>
    <div class="stat-card"><div class="stat-label">Scor mediu</div><div class="stat-value" style="color:${avgColor}">${avg}</div></div>
    <div class="stat-card"><div class="stat-label">Risc ridicat</div><div class="stat-value" style="color:#F87171">${hrPct}%</div><div class="stat-sub">${bc.High+bc.Critical} comenzi</div></div>
    <div class="stat-card"><div class="stat-label">Valoare totala</div><div class="stat-value">${Math.round(val/1000)}k</div><div class="stat-sub">RON</div></div>
  `;

  renderLineChart([...orders].reverse());
  renderPieChart(bc);
  renderOrders();
  renderHashes();
}

function renderLineChart(data) {
  const ctx = document.getElementById("lineChart").getContext("2d");
  if (lineChart) lineChart.destroy();
  lineChart = new Chart(ctx, {
    type: "line",
    data: {
      labels: data.map((_, i) => i + 1),
      datasets: [{
        data: data.map(o => o.score_total),
        borderColor: "#22C55E", borderWidth: 2, pointRadius: 0,
        tension: 0.3, fill: false,
      }],
    },
    options: {
      responsive: true, maintainAspectRatio: false, plugins: { legend: { display: false } },
      scales: {
        x: { grid: { color: "#1a1a2e" }, ticks: { color: "#333", font: { size: 10 } } },
        y: { min: 0, max: 130, grid: { color: "#1a1a2e" }, ticks: { color: "#333", font: { size: 10 } } },
      },
    },
  });
}

function renderPieChart(bc) {
  const ctx = document.getElementById("pieChart").getContext("2d");
  if (pieChart) pieChart.destroy();
  const entries = Object.entries(bc).filter(([, v]) => v > 0);
  pieChart = new Chart(ctx, {
    type: "doughnut",
    data: {
      labels: entries.map(([k]) => k),
      datasets: [{
        data: entries.map(([, v]) => v),
        backgroundColor: entries.map(([k]) => BUCKET[k].dot),
        borderWidth: 0, spacing: 3,
      }],
    },
    options: {
      responsive: true, maintainAspectRatio: false,
      cutout: "60%",
      plugins: { legend: { display: false } },
    },
  });
  document.getElementById("pieLegend").innerHTML = Object.entries(bc).map(([b, c]) =>
    `<div class="pie-legend-item"><div class="pie-legend-dot" style="background:${BUCKET[b].dot}"></div><span class="pie-legend-label">${b}: ${c}</span></div>`
  ).join("");
}

function renderOrders() {
  if (orders.length === 0) {
    document.getElementById("ordersTable").innerHTML = `<div class="table-wrap"><div class="empty">Nicio comanda inca</div></div>`;
    return;
  }
  const header = `<div class="table-header order-grid"><span></span><span>Comanda</span><span>Valoare</span><span>Scor</span><span>Risc</span><span>Status</span></div>`;
  const rows = orders.map((o, i) => {
    const c = BUCKET[o.risk_bucket] || BUCKET.Low;
    const t = new Date(o.scored_at).toLocaleString("ro-RO", { day: "2-digit", month: "short", hour: "2-digit", minute: "2-digit" });
    const statusColor = o.final_status === "delivered" ? "#4ADE80" : o.final_status === "refused" ? "#F87171" : "#555";
    const statusBg = o.final_status === "delivered" ? "#22C55E15" : o.final_status === "refused" ? "#EF444415" : "#ffffff08";
    const statusBorder = o.final_status === "delivered" ? "#22C55E30" : o.final_status === "refused" ? "#EF444430" : "#ffffff10";
    return `<div class="order-row" onclick="openPanel(${i})">
      <div style="display:flex;justify-content:center">${miniRingSVG(o.score_total, o.risk_bucket)}</div>
      <div><div style="font-size:13px;color:#ccc">#${(o.external_order_id||"").slice(-6)||"—"}</div><div style="font-size:11px;color:#555">${t}</div></div>
      <div class="mono" style="font-size:13px;color:#ccc">${Number(o.order_value).toLocaleString()} RON</div>
      <div class="mono" style="font-size:12px;font-weight:600;color:${c.text}">${o.score_total}</div>
      <div><span class="bucket-badge" style="background:${c.border}15;border:1px solid ${c.border}30;color:${c.text}">${o.risk_bucket}</span></div>
      <div><span class="status-badge" style="background:${statusBg};border:1px solid ${statusBorder};color:${statusColor}">${o.final_status||"pending"}</span></div>
    </div>`;
  }).join("");
  document.getElementById("ordersTable").innerHTML = `<div class="table-wrap">${header}${rows}</div>`;
}

function renderHashes() {
  if (hashes.length === 0) {
    document.getElementById("reputationTable").innerHTML = `<div class="table-wrap"><div class="empty">Nicio intrare</div></div>`;
    return;
  }
  const header = `<div class="table-header hash-grid"><span>Hash (truncat)</span><span>Comenzi</span><span>Refuzuri</span><span>Rata</span><span>Ultima activitate</span></div>`;
  const rows = hashes.map(h => {
    const rate = h.total_orders_network > 0 ? h.total_refusals_network / h.total_orders_network : 0;
    const rc = rate >= 0.5 ? "#F87171" : rate >= 0.2 ? "#FACC15" : "#4ADE80";
    const t = new Date(h.last_seen).toLocaleString("ro-RO", { day: "2-digit", month: "short", hour: "2-digit", minute: "2-digit" });
    return `<div class="hash-row">
      <div class="mono" style="font-size:12px;color:#777">${(h.hash_value||"").slice(0,16)}...</div>
      <div class="mono" style="font-size:13px;color:#ccc">${h.total_orders_network}</div>
      <div class="mono" style="font-size:13px;color:${h.total_refusals_network>0?"#F87171":"#4ADE80"}">${h.total_refusals_network}</div>
      <div class="mono" style="font-size:13px;color:${rc}">${(rate*100).toFixed(0)}%</div>
      <div style="font-size:11px;color:#555">${t}</div>
    </div>`;
  }).join("");
  document.getElementById("reputationTable").innerHTML = `<div class="table-wrap">${header}${rows}</div>`;
}

function switchTab(tab) {
  document.getElementById("tabOrders").className = tab === "orders" ? "tab active" : "tab";
  document.getElementById("tabReputation").className = tab === "reputation" ? "tab active" : "tab";
  document.getElementById("ordersTable").style.display = tab === "orders" ? "" : "none";
  document.getElementById("reputationTable").style.display = tab === "reputation" ? "" : "none";
}

function openPanel(idx) {
  selectedOrder = orders[idx];
  const o = selectedOrder;
  const c = BUCKET[o.risk_bucket] || BUCKET.Low;
  const rules = typeof o.rules_triggered === "string" ? JSON.parse(o.rules_triggered) : o.rules_triggered || [];
  const cats = [
    { label: "Client", score: o.score_client, max: 40 },
    { label: "Comanda", score: o.score_order, max: 35 },
    { label: "Comportament", score: o.score_behaviour, max: 35 },
    { label: "Geo", score: o.score_geo, max: 20 },
    { label: "Produs", score: o.score_product, max: 20 },
  ];
  const catHTML = cats.map(ct => {
    const pct = ct.max > 0 ? (ct.score / ct.max) * 100 : 0;
    const barColor = pct >= 80 ? "#EF4444" : pct >= 50 ? "#EAB308" : "#22C55E";
    return `<div style="margin-bottom:10px">
      <div style="display:flex;justify-content:space-between;margin-bottom:4px">
        <span style="font-size:12px;color:#777">${ct.label}</span>
        <span class="mono" style="font-size:12px;color:#ccc">${ct.score}/${ct.max}</span>
      </div>
      <div class="cat-bar-bg"><div class="cat-bar-fill" style="width:${pct}%;background:${barColor}"></div></div>
    </div>`;
  }).join("");
  const rulesHTML = rules.map(r =>
    `<div class="rule-row" style="background:${r.pts<0?"#0D281810":"#1a0a0a10"};border:1px solid ${r.pts<0?"#22C55E15":"#EF444415"}">
      <span style="font-size:12px;color:#999">${r.id.replace(/_/g," ")}</span>
      <span class="mono" style="font-size:12px;font-weight:600;color:${r.pts<0?"#4ADE80":"#F87171"}">${r.pts>0?"+":""}${r.pts}</span>
    </div>`
  ).join("");
  const dataRows = [
    ["Valoare", `${Number(o.order_value).toLocaleString()} RON`],
    ["Produse", o.items_count],
    ["Ora", `${o.hour_of_day}:00`],
    ["IP Tara", o.ip_country],
    ["Distanta IP-livrare", `${o.ip_to_delivery_distance_km} km`],
    ["Discount", `${(Number(o.discount_percent)*100).toFixed(0)}%`],
    ["Comenzi client", o.customer_orders_lifetime],
    ["Refuzuri (90d)", o.customer_refusals_90d],
    ["Refuzuri (total)", o.customer_refusals_lifetime],
  ].map(([k,v]) => `<div class="data-row"><span style="font-size:12px;color:#666">${k}</span><span class="mono" style="font-size:12px;color:#ccc">${v}</span></div>`).join("");

  document.getElementById("panel").innerHTML = `
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:24px">
      <span class="mono" style="font-size:11px;color:#555;letter-spacing:1.5px">ORDER #${(o.external_order_id||"").slice(-6)||"—"}</span>
      <button class="btn" onclick="closePanel()">✕</button>
    </div>
    <div style="padding:20px;border-radius:12px;margin-bottom:20px;background:${c.bg};border:1px solid ${c.border}25">
      <div style="display:flex;align-items:center;gap:16px">
        ${miniRingSVG(o.score_total, o.risk_bucket, 56)}
        <div>
          <div class="mono" style="font-size:32px;font-weight:700;color:${c.text}">${o.score_total}</div>
          <div class="mono" style="font-size:12px;color:${c.text};opacity:0.7">${o.risk_bucket} Risk</div>
        </div>
      </div>
      <div style="margin-top:12px;font-size:13px;color:#999;line-height:1.5">${o.recommended_action}</div>
    </div>
    <div style="margin-bottom:20px">
      <div class="mono" style="font-size:11px;color:#555;letter-spacing:1.5px;margin-bottom:12px">CATEGORII</div>
      ${catHTML}
    </div>
    <div style="margin-bottom:20px">
      <div class="mono" style="font-size:11px;color:#555;letter-spacing:1.5px;margin-bottom:12px">REGULI DECLANSATE (${rules.length})</div>
      ${rulesHTML}
    </div>
    <div>
      <div class="mono" style="font-size:11px;color:#555;letter-spacing:1.5px;margin-bottom:12px">DATE COMANDA</div>
      ${dataRows}
    </div>
  `;
  document.getElementById("panel").style.display = "";
  document.getElementById("panelOverlay").style.display = "";
}

function closePanel() {
  document.getElementById("panel").style.display = "none";
  document.getElementById("panelOverlay").style.display = "none";
  selectedOrder = null;
}

fetchData();
</script>
</body>
</html>
