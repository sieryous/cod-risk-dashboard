<!DOCTYPE html>
<html lang="ro">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>COD Risk Score — Ops</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Fira+Code:wght@400;500;600;700&family=Fira+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
  <style>
    :root {
      --bg:    #0a0a0a;
      --s1:    #0f0f0f;
      --s2:    #141414;
      --b1:    #1e1e1e;
      --b2:    #2a2a2a;
      --tx:    #e2e2e2;
      --td:    #888;
      --tm:    #555;
      --tf:    #333;
      --low:   #22c55e;
      --med:   #f59e0b;
      --hi:    #f97316;
      --crit:  #ef4444;
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { font-size: 14px; }
    body {
      background: var(--bg);
      color: var(--tx);
      font-family: 'Fira Sans', system-ui, sans-serif;
      min-height: 100vh;
      -webkit-font-smoothing: antialiased;
    }
    .mono { font-family: 'Fira Code', monospace; }

    /* ── Header ── */
    #hdr {
      position: sticky; top: 0; z-index: 50;
      background: var(--bg);
      border-bottom: 1px solid var(--b1);
      height: 48px;
      display: flex; align-items: center; justify-content: space-between;
      padding: 0 28px;
    }
    .brand { display: flex; align-items: center; gap: 14px; }
    .live-dot {
      width: 7px; height: 7px; border-radius: 50%;
      background: var(--low); box-shadow: 0 0 7px var(--low);
      flex-shrink: 0;
    }
    .brand-name {
      font-family: 'Fira Code', monospace;
      font-size: 13px; font-weight: 700; letter-spacing: 1px; color: var(--tx);
    }
    .brand-name em { color: var(--low); font-style: normal; }
    .brand-sep { color: var(--b2); font-size: 20px; line-height: 1; }
    .brand-sub {
      font-size: 10px; letter-spacing: 2.5px; color: var(--tm); text-transform: uppercase;
    }
    .hdr-r { display: flex; align-items: center; gap: 16px; }
    .updated { font-family: 'Fira Code', monospace; font-size: 11px; color: var(--tf); }
    .btn-ref {
      font-family: 'Fira Code', monospace; font-size: 11px; letter-spacing: 1px;
      color: var(--td); background: none; border: 1px solid var(--b2);
      padding: 5px 14px; cursor: pointer; transition: color .15s, border-color .15s;
    }
    .btn-ref:hover { color: var(--tx); border-color: var(--td); }
    .btn-ref:disabled { opacity: .35; cursor: default; }

    /* ── Nav ── */
    #nav {
      border-bottom: 1px solid var(--b1);
      padding: 0 28px; display: flex;
    }
    .ntab {
      font-family: 'Fira Code', monospace; font-size: 11px; letter-spacing: 1.5px;
      color: var(--tm); background: none; border: none;
      border-bottom: 2px solid transparent;
      padding: 11px 20px; cursor: pointer; transition: color .15s, border-color .15s;
    }
    .ntab:hover { color: var(--td); }
    .ntab.on { color: var(--tx); border-bottom-color: var(--low); }

    /* ── Loader bar ── */
    #ldr { height: 2px; background: var(--low); display: none;
      box-shadow: 0 0 8px var(--low); }

    /* ── Main ── */
    main { max-width: 1440px; margin: 0 auto; padding: 24px 28px; }

    /* ── Stats grid ── */
    .stats {
      display: grid; grid-template-columns: repeat(6, 1fr);
      gap: 1px; background: var(--b1);
      border: 1px solid var(--b1); margin-bottom: 24px;
    }
    .sc {
      background: var(--s1); padding: 18px 20px;
    }
    .sc-lbl {
      font-family: 'Fira Code', monospace; font-size: 10px;
      letter-spacing: 1.5px; text-transform: uppercase;
      color: var(--tm); margin-bottom: 10px;
    }
    .sc-val {
      font-family: 'Fira Code', monospace; font-size: 32px;
      font-weight: 700; line-height: 1; color: var(--tx);
    }
    .sc-sub { font-size: 11px; color: var(--tf); margin-top: 6px; }

    /* ── Charts ── */
    .charts {
      display: grid; grid-template-columns: 3fr 2fr;
      gap: 1px; background: var(--b1);
      border: 1px solid var(--b1); margin-bottom: 24px;
    }
    .cc { background: var(--s1); padding: 20px 24px; }
    .cc-lbl {
      font-family: 'Fira Code', monospace; font-size: 10px;
      letter-spacing: 2px; text-transform: uppercase;
      color: var(--tm); margin-bottom: 16px;
    }
    .cw { position: relative; height: 190px; }
    .donut-wrap {
      display: flex; flex-direction: column; align-items: center;
    }
    .donut-cw { position: relative; width: 168px; height: 168px; }
    .donut-center {
      position: absolute; inset: 0;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      pointer-events: none;
    }
    .donut-n {
      font-family: 'Fira Code', monospace; font-size: 30px;
      font-weight: 700; line-height: 1; color: var(--tx);
    }
    .donut-sub { font-size: 10px; color: var(--tm); letter-spacing: 1px; margin-top: 3px; }
    .donut-leg {
      display: grid; grid-template-columns: 1fr 1fr;
      gap: 8px 20px; margin-top: 16px; width: 100%;
    }
    .dl-item { display: flex; align-items: center; gap: 8px; }
    .dl-dot { width: 8px; height: 8px; flex-shrink: 0; }
    .dl-name { font-size: 11px; color: var(--td); }
    .dl-cnt {
      font-family: 'Fira Code', monospace; font-size: 11px;
      color: var(--tx); margin-left: auto;
    }

    /* ── Table shared ── */
    .tbl-wrap { border: 1px solid var(--b1); }
    .thead {
      display: grid; background: var(--s2);
      border-bottom: 1px solid var(--b1);
    }
    .th {
      font-family: 'Fira Code', monospace; font-size: 10px;
      letter-spacing: 1.5px; text-transform: uppercase;
      color: var(--tf); padding: 10px 16px;
      user-select: none;
    }
    .th.sort { cursor: pointer; transition: color .15s; }
    .th.sort:hover { color: var(--td); }
    .th.on { color: var(--tx); }

    /* ── Orders table ── */
    .orders-cols { grid-template-columns: 76px 108px 1fr 130px 140px 100px; }
    .orow {
      display: grid; grid-template-columns: 76px 108px 1fr 130px 140px 100px;
      gap: 0; align-items: center; border-bottom: 1px solid var(--b1);
      cursor: pointer; transition: background .1s;
    }
    .orow:last-child { border-bottom: none; }
    .orow:hover { background: var(--s2); }
    .orow.sel { background: #1a1a1a; }
    .td { padding: 12px 16px; }

    /* The star: large score number */
    .score-n {
      font-family: 'Fira Code', monospace;
      font-size: 38px; font-weight: 700; line-height: 1;
      padding: 8px 12px 8px 16px; text-align: right;
    }

    .rbadge {
      font-family: 'Fira Code', monospace; font-size: 10px;
      font-weight: 600; letter-spacing: .5px;
      padding: 3px 9px; display: inline-block;
    }
    .sbadge {
      font-family: 'Fira Code', monospace; font-size: 10px;
      padding: 3px 9px; display: inline-block;
    }
    .oid { font-size: 13px; color: var(--tx); margin-bottom: 3px; }
    .otime { font-family: 'Fira Code', monospace; font-size: 11px; color: var(--tf); }
    .oval { font-family: 'Fira Code', monospace; font-size: 13px; color: var(--td); }

    /* ── Pagination ── */
    .pager {
      display: flex; align-items: center; justify-content: space-between;
      padding: 11px 16px; border-top: 1px solid var(--b1);
      background: var(--s1);
    }
    .pi { font-family: 'Fira Code', monospace; font-size: 11px; color: var(--tm); }
    .pbtns { display: flex; gap: 4px; }
    .pbtn {
      font-family: 'Fira Code', monospace; font-size: 11px;
      background: none; border: 1px solid var(--b2);
      color: var(--td); padding: 4px 12px; cursor: pointer;
      transition: all .15s;
    }
    .pbtn:hover:not(:disabled) { color: var(--tx); border-color: var(--td); }
    .pbtn:disabled { opacity: .3; cursor: default; }

    /* ── Panel ── */
    #ov {
      display: none; position: fixed; inset: 0;
      background: rgba(0,0,0,.65); z-index: 90;
    }
    #panel {
      position: fixed; top: 0; right: 0;
      width: 480px; height: 100vh;
      background: var(--s1); border-left: 1px solid var(--b2);
      overflow-y: auto; z-index: 91;
      transform: translateX(100%);
      transition: transform .22s ease;
    }
    #panel.open { transform: translateX(0); }
    .pi-wrap { padding: 24px; }
    .ph {
      display: flex; align-items: center;
      justify-content: space-between; margin-bottom: 22px;
    }
    .pid {
      font-family: 'Fira Code', monospace;
      font-size: 12px; color: var(--tm); letter-spacing: 1px;
    }
    .pclose {
      font-family: 'Fira Code', monospace; font-size: 13px;
      background: none; border: 1px solid var(--b2);
      color: var(--td); width: 28px; height: 28px;
      display: flex; align-items: center; justify-content: center;
      cursor: pointer; flex-shrink: 0; transition: all .15s;
    }
    .pclose:hover { color: var(--tx); border-color: var(--td); }

    /* Score hero in panel */
    .shero { padding: 20px; margin-bottom: 22px; border: 1px solid; }
    .shero-n {
      font-family: 'Fira Code', monospace;
      font-size: 68px; font-weight: 700; line-height: 1;
    }
    .shero-bkt {
      font-family: 'Fira Code', monospace;
      font-size: 11px; letter-spacing: 2px; margin-top: 6px; opacity: .7;
    }
    .shero-act {
      font-size: 13px; line-height: 1.55; margin-top: 14px;
      padding-top: 14px; border-top: 1px solid; color: var(--td);
    }

    /* Panel sections */
    .psec { margin-bottom: 22px; }
    .psec-t {
      font-family: 'Fira Code', monospace; font-size: 10px;
      letter-spacing: 2px; text-transform: uppercase;
      color: var(--tf); margin-bottom: 12px;
    }

    /* Rule tags */
    .rtags { display: flex; flex-wrap: wrap; gap: 6px; }
    .rtag {
      font-family: 'Fira Code', monospace; font-size: 11px;
      padding: 4px 10px; border: 1px solid;
      display: flex; align-items: center; gap: 8px;
    }
    .rtag-pts { font-weight: 700; }

    /* Data grid in panel */
    .dgrid {
      display: grid; grid-template-columns: 1fr 1fr;
      gap: 0; border: 1px solid var(--b1);
    }
    .di {
      padding: 8px 12px;
      border-bottom: 1px solid var(--b1);
      border-right: 1px solid var(--b1);
    }
    .di:nth-child(even) { border-right: none; }
    .di-lbl {
      font-size: 10px; color: var(--tm);
      letter-spacing: 1px; text-transform: uppercase; margin-bottom: 3px;
    }
    .di-val {
      font-family: 'Fira Code', monospace; font-size: 12px; color: var(--tx);
    }

    /* ── Network table ── */
    .net-cols { grid-template-columns: 1fr 70px 80px 80px 80px 130px; }
    .nrow {
      display: grid; grid-template-columns: 1fr 70px 80px 80px 80px 130px;
      border-bottom: 1px solid var(--b1); align-items: center;
    }
    .nrow:last-child { border-bottom: none; }

    /* ── Empty / Loading ── */
    .empty {
      padding: 52px 24px; text-align: center;
      font-family: 'Fira Code', monospace;
      font-size: 12px; color: var(--tf); letter-spacing: 1.5px;
    }

    /* ── Responsive ── */
    @media (max-width: 1100px) {
      .stats { grid-template-columns: repeat(3, 1fr); }
      .charts { grid-template-columns: 1fr; }
    }
    @media (max-width: 700px) {
      .stats { grid-template-columns: repeat(2, 1fr); }
      .orders-cols,
      .orow { grid-template-columns: 66px 96px 1fr 90px; }
      .orow > .td:nth-child(5),
      .orow > .td:nth-child(6),
      .thead .th:nth-child(5),
      .thead .th:nth-child(6) { display: none; }
      #panel { width: 100%; }
      .score-n { font-size: 28px; }
    }
  </style>
</head>
<body>

<header id="hdr">
  <div class="brand">
    <div class="live-dot"></div>
    <span class="brand-name">COD<em> RISK</em></span>
    <span class="brand-sep">·</span>
    <span class="brand-sub">Fraud Ops Center</span>
  </div>
  <div class="hdr-r">
    <span class="updated" id="upd">—</span>
    <button class="btn-ref" id="refBtn" onclick="loadAll()">↺ REFRESH</button>
  </div>
</header>

<nav id="nav">
  <button class="ntab on" id="nt-dash"    onclick="tab('dash')">DASHBOARD</button>
  <button class="ntab"    id="nt-orders"  onclick="tab('orders')">COMENZI</button>
  <button class="ntab"    id="nt-network" onclick="tab('network')">RETEA</button>
</nav>

<div id="ldr"></div>

<main>
  <!-- DASHBOARD -->
  <div id="v-dash">
    <div class="stats" id="statsGrid"></div>
    <div class="charts">
      <div class="cc">
        <div class="cc-lbl">TREND SCOR MEDIU — ULTIMELE 7 ZILE</div>
        <div class="cw"><canvas id="lc"></canvas></div>
      </div>
      <div class="cc donut-wrap">
        <div class="cc-lbl">DISTRIBUTIE RISC — TOTAL</div>
        <div class="donut-cw">
          <canvas id="dc"></canvas>
          <div class="donut-center">
            <span class="donut-n" id="dTotal">0</span>
            <span class="donut-sub">COMENZI</span>
          </div>
        </div>
        <div class="donut-leg" id="dLeg"></div>
      </div>
    </div>
  </div>

  <!-- ORDERS -->
  <div id="v-orders" style="display:none">
    <div style="height:4px"></div>
    <div class="tbl-wrap">
      <div class="thead orders-cols">
        <div class="th sort on" id="th-score"  onclick="setSort('score_total')">SCOR</div>
        <div class="th">RISC</div>
        <div class="th sort" id="th-date"   onclick="setSort('scored_at')">COMANDA</div>
        <div class="th sort" id="th-val"    onclick="setSort('order_value')">VALOARE</div>
        <div class="th">DATA / ORA</div>
        <div class="th">STATUS</div>
      </div>
      <div id="oBody"></div>
    </div>
    <div class="pager" id="pgr"></div>
  </div>

  <!-- NETWORK -->
  <div id="v-network" style="display:none">
    <div style="height:4px"></div>
    <div class="tbl-wrap">
      <div class="thead net-cols">
        <div class="th">HASH (TRUNCHIAT)</div>
        <div class="th">TIP</div>
        <div class="th">COMENZI</div>
        <div class="th">REFUZURI</div>
        <div class="th">RATA</div>
        <div class="th">ULTIMA ACTIVITATE</div>
      </div>
      <div id="nBody"></div>
    </div>
  </div>
</main>

<div id="ov" onclick="closePanel()"></div>
<aside id="panel"><div class="pi-wrap" id="pInner"></div></aside>

<script>
const SB   = 'https://hoyhptnrdhhpsybpvnab.supabase.co';
const KEY  = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImhveWhwdG5yZGhocHN5YnB2bmFiIiwicm9sZSI6InNlcnZpY2Vfcm9sZSIsImlhdCI6MTc3MjgwNDYxMiwiZXhwIjoyMDg4MzgwNjEyfQ.gt3qMyfqv4Ycu8eu3T2ia4TIFAS5NGXE7qzrtIATE0s';
const MID  = '3a43c66f-d037-4ada-b86b-1688982391a4';
const PAGE = 20;

const R = {
  Low:      { c: '#22c55e', dim: 'rgba(34,197,94,.12)',  bdr: 'rgba(34,197,94,.3)'  },
  Medium:   { c: '#f59e0b', dim: 'rgba(245,158,11,.12)', bdr: 'rgba(245,158,11,.3)' },
  High:     { c: '#f97316', dim: 'rgba(249,115,22,.12)', bdr: 'rgba(249,115,22,.3)' },
  Critical: { c: '#ef4444', dim: 'rgba(239,68,68,.12)',  bdr: 'rgba(239,68,68,.3)'  },
};
const CAT = {
  client:    '#3b82f6',
  order:     '#a855f7',
  behaviour: '#f59e0b',
  geo:       '#06b6d4',
  product:   '#ec4899',
};
function rc(b) { return R[b] || R.Low; }

let orders = [], hashes = [], sortF = 'scored_at', page = 1;
let lChart = null, dChart = null;

// ─── API ────────────────────────────────────────────────────
async function q(table, qs) {
  const r = await fetch(`${SB}/rest/v1/${table}?${qs}`, {
    headers: { apikey: KEY, Authorization: `Bearer ${KEY}` }
  });
  return r.json();
}

// ─── Load ────────────────────────────────────────────────────
async function loadAll() {
  const btn = document.getElementById('refBtn');
  btn.disabled = true; btn.textContent = '...';
  document.getElementById('ldr').style.display = 'block';
  try {
    const fields = 'id,external_order_id,score_total,risk_bucket,recommended_action,rules_triggered,final_status,scored_at,order_value,ip_country,delivery_zone_remote,customer_orders_lifetime,customer_refusals_lifetime,phone_hash';
    [orders, hashes] = await Promise.all([
      q('orders', `merchant_id=eq.${MID}&select=${fields}&order=scored_at.desc&limit=500`),
      q('customer_hashes', 'select=*&order=total_refusals_network.desc&limit=200'),
    ]);
    if (!Array.isArray(orders)) orders = [];
    if (!Array.isArray(hashes)) hashes = [];
    document.getElementById('upd').textContent = new Date().toLocaleTimeString('ro-RO');
    render();
  } catch(e) { console.error(e); }
  btn.disabled = false; btn.textContent = '↺ REFRESH';
  document.getElementById('ldr').style.display = 'none';
}

// ─── Render all ─────────────────────────────────────────────
function render() {
  renderStats();
  renderLine();
  renderDonut();
  renderOrders();
  renderNetwork();
}

// ─── Stats ──────────────────────────────────────────────────
function renderStats() {
  const midnight = new Date(); midnight.setHours(0,0,0,0);
  const today = orders.filter(o => new Date(o.scored_at) >= midnight);
  const n = today.length;
  const avg = n > 0 ? Math.round(today.reduce((s,o) => s + o.score_total, 0) / n) : 0;
  const cnt = { Low:0, Medium:0, High:0, Critical:0 };
  today.forEach(o => { if (cnt[o.risk_bucket] !== undefined) cnt[o.risk_bucket]++; });
  const avgC = avg >= 75 ? R.Critical.c : avg >= 50 ? R.High.c : avg >= 25 ? R.Medium.c : R.Low.c;
  const pct = k => n > 0 ? Math.round(cnt[k]/n*100) : 0;

  document.getElementById('statsGrid').innerHTML = [
    { lbl:'COMENZI AZI',  val: n,          sub: 'ordine procesate',   col: '' },
    { lbl:'SCOR MEDIU',   val: avg,         sub: 'risc mediu azi',     col: avgC },
    { lbl:'LOW',          val: cnt.Low,     sub: pct('Low')+'% azi',   col: R.Low.c },
    { lbl:'MEDIUM',       val: cnt.Medium,  sub: pct('Medium')+'% azi',col: R.Medium.c },
    { lbl:'HIGH',         val: cnt.High,    sub: pct('High')+'% azi',  col: R.High.c },
    { lbl:'CRITICAL',     val: cnt.Critical,sub: pct('Critical')+'% azi',col: R.Critical.c },
  ].map(x => `<div class="sc">
    <div class="sc-lbl">${x.lbl}</div>
    <div class="sc-val" style="color:${x.col||'#e2e2e2'}">${x.val}</div>
    <div class="sc-sub">${x.sub}</div>
  </div>`).join('');
}

// ─── Line chart ──────────────────────────────────────────────
function renderLine() {
  const ctx = document.getElementById('lc').getContext('2d');
  if (lChart) lChart.destroy();

  const days = [], now = new Date();
  for (let i = 6; i >= 0; i--) {
    const d = new Date(now); d.setDate(d.getDate() - i);
    days.push(d.toISOString().slice(0,10));
  }
  const map = {}; days.forEach(d => map[d] = []);
  orders.forEach(o => { const d = o.scored_at.slice(0,10); if (map[d]) map[d].push(o.score_total); });
  const labels = days.map(d => d.slice(5).replace('-','.'));
  const data   = days.map(d => map[d].length ? Math.round(map[d].reduce((a,b)=>a+b,0)/map[d].length) : null);

  // Threshold plugin
  const thr = {
    id: 'thr',
    afterDraw(chart) {
      const {ctx: c, chartArea: a, scales: s} = chart;
      [{y:25,col:'rgba(245,158,11,.2)'},{y:50,col:'rgba(249,115,22,.2)'},{y:75,col:'rgba(239,68,68,.2)'}].forEach(t => {
        const yp = s.y.getPixelForValue(t.y);
        c.save(); c.strokeStyle = t.col; c.lineWidth = 1; c.setLineDash([4,4]);
        c.beginPath(); c.moveTo(a.left, yp); c.lineTo(a.right, yp); c.stroke(); c.restore();
      });
    }
  };

  lChart = new Chart(ctx, {
    type: 'line',
    plugins: [thr],
    data: {
      labels,
      datasets: [{
        data, borderColor: '#22c55e', borderWidth: 2,
        pointRadius: 4, pointBackgroundColor: '#22c55e',
        pointBorderColor: '#0a0a0a', pointBorderWidth: 2,
        tension: 0.25, fill: true,
        backgroundColor: 'rgba(34,197,94,.04)', spanGaps: true,
      }],
    },
    options: {
      responsive: true, maintainAspectRatio: false,
      plugins: {
        legend: { display: false },
        tooltip: {
          backgroundColor: '#141414', borderColor: '#2a2a2a', borderWidth: 1,
          titleColor: '#666', bodyColor: '#e2e2e2',
          bodyFont: { family: 'Fira Code', size: 13 },
          callbacks: { label: c => ` scor mediu: ${c.raw ?? '—'}` },
        },
      },
      scales: {
        x: { grid: { color: '#1a1a1a' }, ticks: { color: '#444', font: { family: 'Fira Code', size: 10 } } },
        y: { min: 0, max: 100, grid: { color: '#1a1a1a' },
             ticks: { color: '#444', font: { family: 'Fira Code', size: 10 }, stepSize: 25 } },
      },
    },
  });
}

// ─── Donut ───────────────────────────────────────────────────
function renderDonut() {
  const ctx = document.getElementById('dc').getContext('2d');
  if (dChart) dChart.destroy();
  const cnt = { Low:0, Medium:0, High:0, Critical:0 };
  orders.forEach(o => { if (cnt[o.risk_bucket]!==undefined) cnt[o.risk_bucket]++; });
  const total = orders.length;
  document.getElementById('dTotal').textContent = total;
  const entries = Object.entries(cnt);
  const hasData = entries.some(([,v]) => v > 0);

  dChart = new Chart(ctx, {
    type: 'doughnut',
    data: {
      labels: entries.map(([k]) => k),
      datasets: [{
        data: hasData ? entries.map(([,v]) => v) : [1],
        backgroundColor: hasData ? entries.map(([k]) => R[k].c) : ['#1e1e1e'],
        borderWidth: 0, spacing: 3,
      }],
    },
    options: {
      responsive: true, maintainAspectRatio: true, cutout: '65%',
      plugins: { legend: { display: false }, tooltip: { enabled: hasData } },
    },
  });

  document.getElementById('dLeg').innerHTML = entries.map(([b,c]) => `
    <div class="dl-item">
      <div class="dl-dot" style="background:${R[b].c}"></div>
      <span class="dl-name">${b}</span>
      <span class="dl-cnt">${c}</span>
    </div>`).join('');
}

// ─── Orders ──────────────────────────────────────────────────
function sorted() {
  const a = [...orders];
  if (sortF === 'score_total')  a.sort((x,y) => y.score_total - x.score_total);
  else if (sortF === 'order_value') a.sort((x,y) => Number(y.order_value) - Number(x.order_value));
  else a.sort((x,y) => new Date(y.scored_at) - new Date(x.scored_at));
  return a;
}

function renderOrders() {
  const arr   = sorted();
  const total = arr.length;
  const pages = Math.max(1, Math.ceil(total / PAGE));
  if (page > pages) page = pages;
  const slice = arr.slice((page-1)*PAGE, page*PAGE);

  // Update header sort indicators
  ['score','date','val'].forEach(k => {
    const el = document.getElementById('th-'+k);
    if (!el) return;
    const f = k==='score'?'score_total':k==='date'?'scored_at':'order_value';
    el.className = 'th sort' + (sortF===f?' on':'');
    el.textContent = {score:'SCOR',date:'COMANDA',val:'VALOARE'}[k] + (sortF===f?' ↓':'');
  });

  if (!total) {
    document.getElementById('oBody').innerHTML = '<div class="empty">— NICIO COMANDA —</div>';
    document.getElementById('pgr').innerHTML = '';
    return;
  }

  const SC = {
    delivered: { c:'#22c55e', bg:'rgba(34,197,94,.1)',  b:'rgba(34,197,94,.25)'  },
    refused:   { c:'#ef4444', bg:'rgba(239,68,68,.1)',  b:'rgba(239,68,68,.25)'  },
    cancelled: { c:'#f97316', bg:'rgba(249,115,22,.1)', b:'rgba(249,115,22,.25)' },
    pending:   { c:'#555',    bg:'rgba(80,80,80,.1)',   b:'rgba(80,80,80,.2)'    },
  };

  const globalOffset = (page-1)*PAGE;
  document.getElementById('oBody').innerHTML = slice.map((o, i) => {
    const ri = rc(o.risk_bucket);
    const sc = SC[o.final_status] || SC.pending;
    const dt = new Date(o.scored_at);
    const ds = dt.toLocaleDateString('ro-RO', { day:'2-digit', month:'short' });
    const ts = dt.toLocaleTimeString('ro-RO', { hour:'2-digit', minute:'2-digit' });
    const eid = (o.external_order_id||'').slice(-8) || o.id.slice(0,8);
    return `<div class="orow" onclick="openPanel(${globalOffset+i})">
      <div class="score-n" style="color:${ri.c}">${o.score_total}</div>
      <div class="td">
        <span class="rbadge" style="background:${ri.dim};border:1px solid ${ri.bdr};color:${ri.c}">${o.risk_bucket}</span>
      </div>
      <div class="td">
        <div class="oid">#${eid}</div>
      </div>
      <div class="td"><span class="oval">${Number(o.order_value||0).toLocaleString('ro-RO')} RON</span></div>
      <div class="td"><div class="otime">${ds}</div><div class="otime">${ts}</div></div>
      <div class="td">
        <span class="sbadge" style="background:${sc.bg};border:1px solid ${sc.b};color:${sc.c}">${o.final_status||'pending'}</span>
      </div>
    </div>`;
  }).join('');

  const start = (page-1)*PAGE + 1;
  document.getElementById('pgr').innerHTML = `
    <span class="pi">${start}–${Math.min(page*PAGE,total)} din ${total}</span>
    <div class="pbtns">
      <button class="pbtn" onclick="goPage(${page-1})" ${page<=1?'disabled':''}>← PREV</button>
      <button class="pbtn" onclick="goPage(${page+1})" ${page>=pages?'disabled':''}>NEXT →</button>
    </div>`;
}

function setSort(f) { sortF = f; page = 1; renderOrders(); }
function goPage(p)  { page = p; renderOrders(); document.getElementById('v-orders').scrollIntoView({behavior:'smooth'}); }

// ─── Network ─────────────────────────────────────────────────
function renderNetwork() {
  if (!hashes.length) {
    document.getElementById('nBody').innerHTML = '<div class="empty">— NICIO INTRARE —</div>';
    return;
  }
  document.getElementById('nBody').innerHTML = hashes.map(h => {
    const rate = h.total_orders_network > 0 ? h.total_refusals_network / h.total_orders_network : 0;
    const ri   = rate >= .5 ? R.Critical : rate >= .2 ? R.Medium : R.Low;
    const t    = h.last_seen ? new Date(h.last_seen).toLocaleDateString('ro-RO',{day:'2-digit',month:'short',year:'2-digit'}) : '—';
    return `<div class="nrow">
      <div class="td"><span class="mono" style="font-size:11px;color:#555">${(h.hash_value||'').slice(0,22)}…</span></div>
      <div class="td"><span style="font-size:10px;color:#666;letter-spacing:1px;text-transform:uppercase">${h.hash_type||'—'}</span></div>
      <div class="td"><span class="mono" style="font-size:13px;color:#e2e2e2">${h.total_orders_network}</span></div>
      <div class="td"><span class="mono" style="font-size:13px;color:${h.total_refusals_network>0?'#ef4444':'#555'}">${h.total_refusals_network}</span></div>
      <div class="td"><span class="rbadge" style="font-size:10px;background:${ri.dim};border:1px solid ${ri.bdr};color:${ri.c}">${(rate*100).toFixed(0)}%</span></div>
      <div class="td"><span style="font-size:11px;color:#555">${t}</span></div>
    </div>`;
  }).join('');
}

// ─── Panel ───────────────────────────────────────────────────
function openPanel(idx) {
  const arr = sorted();
  const o   = arr[idx]; if (!o) return;
  const ri  = rc(o.risk_bucket);

  const rules = (() => {
    try { return Array.isArray(o.rules_triggered) ? o.rules_triggered : JSON.parse(o.rules_triggered||'[]'); }
    catch { return []; }
  })();

  const refRate = o.customer_orders_lifetime > 0
    ? ((o.customer_refusals_lifetime / o.customer_orders_lifetime)*100).toFixed(0)+'%'
    : '—';

  const rulesHTML = rules.length
    ? `<div class="rtags">${rules.map(r => {
        const cc = CAT[r.cat] || '#888';
        return `<div class="rtag" style="border-color:${cc}33;background:${cc}0d;color:${cc}">
          <span>${(r.id||'').replace(/_/g,' ')}</span>
          <span class="rtag-pts" style="color:${r.pts<0?'#22c55e':'#ef4444'}">${r.pts>0?'+':''}${r.pts}</span>
        </div>`;
      }).join('')}</div>`
    : '<span style="font-family:Fira Code,monospace;font-size:11px;color:#333">— nicio regula —</span>';

  const fields = [
    ['VALOARE',       `${Number(o.order_value||0).toLocaleString('ro-RO')} RON`],
    ['IP TARA',       o.ip_country||'—'],
    ['COMENZI CLIENT',o.customer_orders_lifetime??'—'],
    ['REFUZURI',      o.customer_refusals_lifetime??'—'],
    ['RATA REFUZ',    refRate],
    ['ZONA REMOTE',   o.delivery_zone_remote?'DA':'NU'],
    ['STATUS FINAL',  o.final_status||'pending'],
    ['PHONE HASH',    (o.phone_hash||'—').slice(0,14)+(o.phone_hash?'…':'')],
  ];

  const t = new Date(o.scored_at).toLocaleString('ro-RO',{dateStyle:'medium',timeStyle:'short'});
  const eid = (o.external_order_id||'').slice(-8) || o.id.slice(0,8);

  document.getElementById('pInner').innerHTML = `
    <div class="ph">
      <span class="pid">ORDER #${eid}</span>
      <button class="pclose" onclick="closePanel()">✕</button>
    </div>
    <div class="shero" style="background:${ri.dim};border-color:${ri.bdr}">
      <div class="shero-n" style="color:${ri.c}">${o.score_total}</div>
      <div class="shero-bkt" style="color:${ri.c}">${o.risk_bucket.toUpperCase()} RISK</div>
      <div class="shero-act" style="border-color:${ri.bdr}">${o.recommended_action||'—'}</div>
    </div>
    <div class="psec">
      <div class="psec-t">REGULI DECLANSATE (${rules.length})</div>
      ${rulesHTML}
    </div>
    <div class="psec">
      <div class="psec-t">DATE COMANDA</div>
      <div class="dgrid">${fields.map(([l,v])=>`
        <div class="di"><div class="di-lbl">${l}</div><div class="di-val">${v}</div></div>`
      ).join('')}</div>
      <div style="margin-top:8px;font-family:Fira Code,monospace;font-size:10px;color:#333">EVALUAT ${t}</div>
    </div>`;

  document.getElementById('ov').style.display = 'block';
  const p = document.getElementById('panel');
  p.style.display = 'block'; // ensure visible before transform
  requestAnimationFrame(() => p.classList.add('open'));
}

function closePanel() {
  document.getElementById('panel').classList.remove('open');
  document.getElementById('ov').style.display = 'none';
}

// ─── Tabs ────────────────────────────────────────────────────
function tab(t) {
  ['dash','orders','network'].forEach(k => {
    document.getElementById('v-'+k).style.display   = k===t ? '' : 'none';
    document.getElementById('nt-'+k).className      = k===t ? 'ntab on' : 'ntab';
  });
}

// ─── Keyboard ────────────────────────────────────────────────
document.addEventListener('keydown', e => { if (e.key === 'Escape') closePanel(); });

// ─── Init ────────────────────────────────────────────────────
loadAll();
</script>
